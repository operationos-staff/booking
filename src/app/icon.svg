<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="55%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#7c2d12"/>
    </radialGradient>
    <linearGradient id="trunk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3f1d10"/>
      <stop offset="100%" stop-color="#1a0a06"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fef9c3"/>
      <stop offset="60%" stop-color="#fde047"/>
      <stop offset="100%" stop-color="#facc15"/>
    </radialGradient>
  </defs>

  <!-- background circle -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>

  <!-- sun -->
  <circle cx="44" cy="20" r="7" fill="url(#sun)"/>

  <!-- water / island base -->
  <path d="M0 50 Q 16 44 32 50 T 64 50 V64 H0 Z" fill="#0e3a5b" opacity="0.55"/>
  <path d="M0 54 Q 16 49 32 54 T 64 54 V64 H0 Z" fill="#082a45" opacity="0.85"/>
  <ellipse cx="32" cy="51" rx="22" ry="3" fill="#fde68a" opacity="0.55"/>

  <!-- palm trunk -->
  <path d="M30 50 C 26 40, 28 30, 30 22 C 32 28, 33 38, 34 50 Z" fill="url(#trunk)"/>

  <!-- palm fronds -->
  <g fill="#15803d" stroke="#052e16" stroke-width="0.8" stroke-linejoin="round">
    <path d="M30 22 C 22 16, 14 16, 8 20 C 16 18, 24 18, 30 24 Z"/>
    <path d="M30 22 C 36 14, 46 12, 54 16 C 46 16, 38 18, 32 24 Z"/>
    <path d="M30 22 C 26 12, 22 6, 18 4 C 24 10, 28 16, 30 24 Z"/>
    <path d="M30 22 C 34 14, 40 8, 46 6 C 40 12, 34 18, 32 24 Z"/>
    <path d="M30 22 C 22 22, 14 26, 10 30 C 18 26, 26 24, 30 26 Z"/>
    <path d="M30 22 C 38 22, 46 26, 52 30 C 44 26, 36 24, 32 26 Z"/>
  </g>

  <!-- coconuts -->
  <circle cx="29" cy="23" r="1.6" fill="#3f2410"/>
  <circle cx="32" cy="24" r="1.6" fill="#3f2410"/>

  <!-- inner ring (premium) -->
  <circle cx="32" cy="32" r="31" fill="none" stroke="#fbbf24" stroke-width="0.8" opacity="0.6"/>
</svg>
